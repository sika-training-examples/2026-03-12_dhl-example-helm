{{ if .Values.hostFrontendGo }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: go-frontend
  annotations:
    route.openshift.io/termination: "edge"
    route.openshift.io/insecureEdgeTerminationPolicy: "Redirect"
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  {{ if .Values.ingressTls }}
  tls:
    - hosts:
        - {{ .Values.hostFrontendGo }}
      secretName: {{ .Values.hostFrontendGo }}-tls
  {{ end }}
  rules:
    - host: {{ .Values.hostFrontendGo }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: go-frontend
                port:
                  number: 80
          - path: /api/counter
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
{{ end }}
