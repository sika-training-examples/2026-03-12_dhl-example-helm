{{ if .Values.hostFrontendGo }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: go-frontend
  annotations:
    route.openshift.io/termination: "edge"
    route.openshift.io/insecureEdgeTerminationPolicy: "Redirect"
spec:
  ingressClassName: openshift-default
  rules:
    - host: {{ .Values.hostFrontendGo }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: go-frontend
                port:
                  number: 80
          - path: /api/counter
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
{{ end }}
