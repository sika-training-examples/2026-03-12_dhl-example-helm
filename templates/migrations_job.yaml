apiVersion: batch/v1
kind: Job
metadata:
  name: migrations
  annotations:
    app.openshift.io/connects-to: |
      [{"apiVersion":"apps/v1","kind":"StatefulSet","name":"redis"}]
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-redis
          image: ghcr.io/sikalabs/slu:v0.99.0
          command: 
            - slu
            - wait-for
            - tcp 
            - --address
            - redis:6379
      containers:
        - name: main
          image: redis:8
          command:
            - /bin/sh
            - -c
            - redis-cli -h redis incrby counter '10000' && sleep 10 && echo Done
