apiVersion: v1
kind: Service
metadata:
  name: redis
  annotations:
    {{ if .Values.enableArgoCDHooks }}
    argocd.argoproj.io/sync-wave: "-2"
    {{ else }}
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-2"
    {{ end }}
spec:
  selector:
    app: redis
  ports:
    - port: 6379
