apiVersion: v1
kind: ConfigMap
metadata:
  name: backup
data:
  tergum.yaml: |
    Meta:
      SchemaVersion: 3
    Telemetry:
      CollectBackupLog: true
      CollectHostData: true
    Backups:
      - ID: redis
        Source:
          Redis:
            Host: redis
            Port: 6379
        Targets:
          - ID: filepath
            FilePath:
              Path: /backup/latest.rdb
          - ID: file
            File:
              Dir: /backup
              Prefix: redis
              Suffix: rdb
